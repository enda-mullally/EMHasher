name: Build and test

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
        fullbuild:
          type: boolean
          description: Perform a full build
          default: false

jobs:
  build:
    runs-on: windows-latest
    env:
      TargetMinWinVersion: net10.0-windows10.0.22621.0
    
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    #
