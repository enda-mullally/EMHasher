name: Build package

on:
  workflow_dispatch:

jobs:
  build-package-bundle:
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      
      - name: Setup MSBuild (VS 2026)
        uses: microsoft/setup-msbuild@v3
        
      - name: Install .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Read app manifest version
        working-directory: "src\\EM.Hasher (Package)"
        id: version
        shell: pwsh
        run: |
          [xml]$manifest = Get-Content "Package.appxmanifest"
          $version = $manifest.Package.Identity.Version -replace '\.0$'
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Display app manifest version
        run: echo "App manifest version is ${{ steps.version.outputs.version }}"

      - name: Restore EM Hasher package project
        working-directory: "src\\EM.Hasher (Package)"
        run: |
          msbuild "EM.Hasher (Package).wapproj" /t:Restore /p:Configuration=Release

      - name: Make package dir
        shell: cmd
        run: |
          mkdir Package

      - name: Build package bundle (.msixupload)
        working-directory: "src\\EM.Hasher (Package)"
        shell: pwsh
        run: |
          msbuild "EM.Hasher (Package).wapproj" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:AppxBundle=Always `
            /p:AppxBundlePlatforms="x64|arm64" `
            /p:AppxPackageDir="${{ github.workspace }}\\Package" `
            /p:AppxPackageSigningEnabled=false `
            /p:GenerateTemporaryStoreCertificate=false `
            /p:PackageCertificateThumbprint= `
            /p:PackageCertificateKeyFile= `
            /p:FileVersion="${{ steps.version.outputs.version }}" `
            /p:ProductVersion="${{ steps.version.outputs.version }}" `
            /p:Copyright="© 2025-2026 Enda Mullally"

      - name: Upload package bundle (.msixupload)
        uses: actions/upload-artifact@v7
        with:
          name: EMHasher-Package-Bundle
          retention-days: 1
          path: |
            Package/*.msixupload
