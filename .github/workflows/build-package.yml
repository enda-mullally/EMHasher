name: Build '.msixupload' package

on:
  workflow_dispatch:

jobs:
  build-package-bundle:
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      # See: https://github.com/actions/runner-images/issues/14017
      # VS2026 should be available by June 15, nearly there.
      #- name: Setup MSBuild (VS 2026)
      #  uses: microsoft/setup-msbuild@v3
      #  with:
      #      vs-version: '[18.0,19.0)'
      
      - name: Install Visual Studio Build Tools
        shell: pwsh
        run: |
          Write-Host "Installing VS 2026 Build Tools..."
          choco install visualstudio2026buildtools `
          --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --includeRecommended --quiet" `
          -y --ignore-package-exit-codes=3010
          Write-Host "VS 2026 Build Tools installation completed" 

      - name: Build project (${{ matrix.config }}, x64, C++latest)
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\18\BuildTools\Common7\Tools\VsDevCmd.bat"
    
      - name: Install .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore EM Hasher package project
        working-directory: "src\\EM.Hasher (Package)"
        run: |
          msbuild "EM.Hasher (Package).wapproj" /t:Restore /p:Configuration=Release

      - name: Make package dir
        shell: cmd
        run: |
          mkdir Package

      - name: Build package bundle (.msixupload)
        working-directory: "src\\EM.Hasher (Package)"
        shell: pwsh
        run: |
          msbuild "EM.Hasher (Package).wapproj" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:AppxBundle=Always `
            /p:AppxBundlePlatforms="x64|arm64" `
            /p:AppxPackageDir="${{ github.workspace }}\\Package" `
            /p:AppxPackageSigningEnabled=false

      - name: Upload package bundle (.msixupload)
        uses: actions/upload-artifact@v4
        with:
          name: EMHasher-Package-Bundle
          retention-days: 1
          path: |
            Package/*.msixupload
